<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blind Touch Interface</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Blind Touch Interface</h1>

    <!-- Area pesan -->
    <div class="message-box" id="messageBox">
      ...
    </div>

    <!-- Keyboard tactile sederhana -->
    <div class="keyboard">

      <button class="key">A</button>
      <button class="key">B</button>
      <button class="key">C</button>

      <button class="key">SPACE</button>
      <button class="key">DELETE</button>

    </div>

    <!-- Tombol akses aplikasi -->
    <div class="app-buttons">

      <button id="waBtn">
        WHATSAPP
      </button>

      <button id="ytBtn">
        YOUTUBE
      </button>

      <button id="smsBtn">
        SMS
      </button>

      <button id="callBtn">
        TELEPON
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
