<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manual Gesture AI - Blind-T</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body { background-color: #000; color: #00ff00; font-family: sans-serif; height: 100vh; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 1; touch-action: none; }

        .ui-overlay {
            position: relative; z-index: 0; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
        }

        #status {
            position: fixed; top: 50%; transform: translateY(-50%);
            font-size: 40px; font-weight: bold; text-align: center;
            text-shadow: 0 0 20px #00ff00; color: #fff;
        }

        .hint { position: fixed; bottom: 10%; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-overlay">
        <div id="status">GAMBAR HURUF</div>
        <div class="hint">W: Lebar | T: Tegak | S: Zigzag Horizontal | Y: Coret Atas</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        
        let points = [];
        let isDrawing = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- LOGIKA PENGENALAN (THE BRAIN) ---
        function recognizeGesture(pts) {
            if (pts.length < 10) return null;

            let minX = pts[0].x, maxX = pts[0].x;
            let minY = pts[0].y, maxY = pts[0].y;

            pts.forEach(p => {
                if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
            });

            const width = maxX - minX;
            const height = maxY - minY;
            const ratio = width / height;
            
            const start = pts[0];
            const end = pts[pts.length - 1];
            const distY = end.y - start.y;
            const distX = end.x - start.x;

            // 1. Logika Huruf 'T' (Telepon) -> Memanjang ke bawah, rasio sempit
            if (ratio < 0.6 && distY > 100) {
                return { app: "Telepon", url: "tel:0812345" };
            }

            // 2. Logika Huruf 'W' (WhatsApp) -> Sangat lebar, rasio besar
            if (ratio > 1.5) {
                return { app: "WhatsApp", url: "whatsapp://send" };
            }

            // 3. Logika Huruf 'Y' (YouTube) -> Coretan ke atas (negatif Y)
            if (distY < -100) {
                return { app: "YouTube", url: "vnd.youtube://" };
            }

            // 4. Logika Huruf 'S' (SMS) -> Gerakan horizontal bolak-balik
            if (ratio > 0.8 && ratio < 1.4 && Math.abs(distX) > 100) {
                return { app: "SMS", url: "sms:" };
            }

            return null;
        }

        // --- ENGINE MENGGAMBAR ---
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const t = e.touches[0];
            points.push({ x: t.clientX, y: t.clientY });
            vibrate(40);
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const t = e.touches[0];
            const p = { x: t.clientX, y: t.clientY };
            
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(points[points.length-1].x, points[points.length-1].y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            
            points.push(p);
        });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
            const result = recognizeGesture(points);
            
            if (result) {
                statusText.innerText = result.app;
                vibrate([100, 50, 100]);
                speak("Membuka " + result.app);
                setTimeout(() => window.location.href = result.url, 1500);
            } else {
                statusText.innerText = "COBA LAGI";
                vibrate(400);
                speak("Maaf, tidak terbaca");
                setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); statusText.innerText = "GAMBAR HURUF"; }, 1000);
            }
        });

        function speak(text) {
            window.speechSynthesis.cancel(); // Hentikan suara sebelumnya
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        function vibrate(p) { if(navigator.vibrate) navigator.vibrate(p); }
    </script>
</body>
</html>
